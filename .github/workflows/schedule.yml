name: API Schedule

on:
  workflow_dispatch:
    inputs:
      acao:
        description: 'Ação'
        required: true
        default: 'suspender'
        type: choice
        options:
          - suspender
          - reativar
  schedule:
    - cron: '30 1 * * *'   # 22:30 BRT → suspender
    - cron: '30 11 * * *'  # 08:30 BRT → reativar

jobs:
  suspender:
    if: github.event.schedule == '30 1 * * *' || github.event.inputs.acao == 'suspender'
    runs-on: ubuntu-latest
    steps:
      - name: Suspender API
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/suspend" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"

  reativar:
    if: github.event.schedule == '30 11 * * *' || github.event.inputs.acao == 'reativar'
    runs-on: ubuntu-latest
    steps:
      - name: Reativar API
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"
