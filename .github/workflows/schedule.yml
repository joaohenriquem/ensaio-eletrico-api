name: API Schedule

on:
  schedule:
    - cron: '0 2 * * *'   # 23:00 BRT → suspender
    - cron: '0 9 * * *'   # 06:00 BRT → reativar

jobs:
  suspender:
    if: github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Suspender API
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/suspend" \
            -H "Authorization: Bearer ${{ secrets.github_suspend }}" \
            -H "Content-Type: application/json"

  reativar:
    if: github.event.schedule == '0 9 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Reativar API
        run: |
          curl -s -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
            -H "Authorization: Bearer ${{ secrets.github_suspend }}" \
            -H "Content-Type: application/json"
