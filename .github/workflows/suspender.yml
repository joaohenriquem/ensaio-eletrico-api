name: Suspender API (20:00 BRT)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'   # 20:00 BRT (23:00 UTC) — horário alvo

jobs:
  suspender:
    runs-on: ubuntu-latest
    steps:
      - name: Suspender API no Render
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/suspend" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json")
          echo "Resposta: $RESPONSE"
