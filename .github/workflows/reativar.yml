name: Reativar API (08:00 BRT)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'    # 03:00 BRT — disparo antecipado para compensar atraso do GitHub (3-5h)
    - cron: '0 11 * * *'   # 08:00 BRT (11:00 UTC) — horário alvo como backup

jobs:
  reativar:
    runs-on: ubuntu-latest
    steps:
      - name: Reativar API no Render
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/resume" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json")
          echo "Resposta: $RESPONSE"
